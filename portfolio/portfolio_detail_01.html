<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>프로젝트 상세</title>
    <style>
        body { background-color: #f5f5f5; padding: 40px; display: flex; justify-content: center; }
        .slide-container { width: 800px; background: #fff; padding: 40px; box-shadow: 0 0 15px rgba(0,0,0,0.1); text-align: center; }
        
        /* 슬라이드 이미지 영역 */
        .slide-img { width: 100%; height: 400px; background: #ddd; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; overflow: hidden; }
        .slide-img img { width: 100%; height: 100%; object-fit: cover; }
        
        .project-header { text-align: left; margin-bottom: 20px; }
        .project-header h2 { color: #ff6f00; border-bottom: 2px solid #ff6f00; display: inline-block; }
        .description { text-align: left; line-height: 1.8; color: #444; font-size: 15px; }
        
        .nav-links { margin-top: 40px; display: flex; justify-content: space-between; }
        .nav-links a { color: #777; text-decoration: none; }
    </style>
</head>
<body>

<div class="slide-container">
    <div class="project-header">
        <h2>프로젝트 제목</h2>
    </div>
    
    <!-- 사진 영역 -->
    <div class="slide-img">
        <img src="./image/project1_pic.jpg" alt="실습장면">
    </div>
    
    <!-- 작업 설명 영역 -->
    <div class="description">
        <p><strong>작업 내용:</strong> 여기에 상세한 작업 내용을 입력하세요.</p>
        <p><strong>사용 기술:</strong> 전기회로 설계, PLC 제어 등</p>
    </div>

    <div class="nav-links">
        <a href="portfolio.html">← 목록으로 돌아가기</a>
    </div>
</div>

</body>
</html>
